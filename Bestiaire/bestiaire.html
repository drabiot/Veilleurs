<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="../img/VeilleursLogo.png" />
  <title>[VCL] - Bestiaire</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="bestiaire.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Cinzel:wght@600;900&display=swap" rel="stylesheet" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-1ZEKMF3QVS"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-1ZEKMF3QVS');

</head>
<body class="bestiaire-page">

  <!-- Fond ambiant -->
  <div class="ambient-bg" aria-hidden="true">
    <div class="moon"></div>
    <div class="fog fog-1"></div>
    <div class="fog fog-2"></div>
    <div class="vignette"></div>
  </div>

  <!-- ══════ HEADER ══════ -->
  <header class="site-header">
    <div class="header-top">
      <div class="header-left">
        <div class="traffic-lights">
          <span class="tl tl-red"></span>
          <span class="tl tl-yellow"></span>
          <span class="tl tl-green"></span>
        </div>
        <span class="header-sep">─────</span>
        <a href="../index.html" class="header-logo">Veilleurs au Clair de Lune</a>
      </div>
      <div class="header-right"></div>
    </div>
    <nav class="header-nav">
      <a href="../index.html" class="nav-link">
        <span class="nav-icon">📜</span><span class="nav-label">Patchnotes</span>
      </a>
      <a href="../Map/map.html" class="nav-link">
        <span class="nav-icon">🗺️</span><span class="nav-label">Carte</span>
      </a>
      <a href="../Compendium/compendium.html" class="nav-link">
        <span class="nav-icon">📖</span><span class="nav-label">Compendium</span>
      </a>
      <a href="bestiaire.html" class="nav-link active">
        <span class="nav-icon">💀</span><span class="nav-label">Bestiaire</span>
      </a>
      <a href="../Atelier/atelier.html" class="nav-link">
        <span class="nav-icon">🔨</span><span class="nav-label">Atelier</span>
      </a>
    </nav>
  </header>

  <!-- ══════ LAYOUT ══════ -->
  <div class="bestiaire-layout">

    <!-- ══ SIDEBAR ══ -->
    <aside class="bestiaire-sidebar">

      <!-- Recherche -->
      <div class="sidebar-search">
        <input type="text" id="sidebar-search" placeholder="🔍  Rechercher…" autocomplete="off" />
      </div>

      <!-- Onglets Monstres / Personnages -->
      <div class="sidebar-sort-bar">
        <button class="sort-btn active" data-tab="monstres">💀 Monstres</button>
        <button class="sort-btn" data-tab="personnages">🧑 PNJ</button>
      </div>

      <!-- Zone scrollable -->
      <div id="sidebar-scroll" class="sidebar-scroll">

        <!-- ─ Paliers ─ -->
        <div class="filter-block" id="palier-block">
          <div class="filter-block-header open" id="palier-block-header">
            <span class="palier-label">⬡ Palier</span>
            <span class="palier-arrow">▶</span>
          </div>
          <div class="filter-block-body open" id="palier-block-body">
            <div id="palier-filters"></div>
          </div>
        </div>

        <!-- ─ Type (Boss / Monstre / Sbire) ─ -->
        <div class="filter-block" id="type-block">
          <div class="filter-block-header open" id="type-block-header">
            <span class="palier-label">◈ Type</span>
            <span class="palier-arrow">▶</span>
          </div>
          <div class="filter-block-body open" id="type-block-body">
            <div class="bfilter-list" id="type-filters">
              <label class="bfilter-row">
                <input type="checkbox" class="type-filter-cb" value="boss" checked />
                <span class="bfilter-dot bfilter-boss"></span>
                <span class="bfilter-label">Boss</span>
                <span class="bfilter-count" id="count-boss"></span>
              </label>
			  <label class="bfilter-row">
                <input type="checkbox" class="type-filter-cb" value="mini_boss" checked />
                <span class="bfilter-dot bfilter-mini_boss"></span>
                <span class="bfilter-label">Mini Boss</span>
                <span class="bfilter-count" id="count-mini_boss"></span>
              </label>
              <label class="bfilter-row">
                <input type="checkbox" class="type-filter-cb" value="monstre" checked />
                <span class="bfilter-dot bfilter-monstre"></span>
                <span class="bfilter-label">Monstre</span>
                <span class="bfilter-count" id="count-monstre"></span>
              </label>
              <label class="bfilter-row">
                <input type="checkbox" class="type-filter-cb" value="sbire" checked />
                <span class="bfilter-dot bfilter-sbire"></span>
                <span class="bfilter-label">Sbire</span>
                <span class="bfilter-count" id="count-sbire"></span>
              </label>
            </div>
          </div>
        </div>

        <!-- ─ Catégorie PNJ ─ -->
        <div class="filter-block" id="pnj-tag-block" style="display:none">
          <div class="filter-block-header open" id="pnj-tag-block-header">
            <span class="palier-label">◈ Catégorie</span>
            <span class="palier-arrow">▶</span>
          </div>
          <div class="filter-block-body open" id="pnj-tag-block-body">
            <div class="bfilter-list" id="pnj-tag-filters">

              <!-- ── Forgerons ── -->
              <div class="pnj-cat-group">
                <div class="pnj-cat-header" data-cat="forgeron">
                  <span class="pnj-cat-arrow open">▶</span>
                  <span class="bfilter-dot bfilter-forgeron"></span>
                  <span class="pnj-cat-title">Forgerons</span>
                  <span class="bfilter-count" id="group-count-forgeron"></span>
                </div>
                <div class="pnj-cat-body open pnj-cat-forgeron" id="group-body-forgeron">
                  <label class="bfilter-row bfilter-sub">
                    <input type="checkbox" class="pnj-tag-filter-cb" value="forgeron_armes" checked />
                    <span class="bfilter-label">d'Armes</span>
                    <span class="bfilter-count" id="count-forgeron_armes"></span>
                  </label>
                  <label class="bfilter-row bfilter-sub">
                    <input type="checkbox" class="pnj-tag-filter-cb" value="forgeron_armures" checked />
                    <span class="bfilter-label">d'Armures</span>
                    <span class="bfilter-count" id="count-forgeron_armures"></span>
                  </label>
                  <label class="bfilter-row bfilter-sub">
                    <input type="checkbox" class="pnj-tag-filter-cb" value="forgeron_accessoires" checked />
                    <span class="bfilter-label">d'Accessoires</span>
                    <span class="bfilter-count" id="count-forgeron_accessoires"></span>
                  </label>
                  <label class="bfilter-row bfilter-sub">
                    <input type="checkbox" class="pnj-tag-filter-cb" value="forgeron_lingots" checked />
                    <span class="bfilter-label">de Lingots</span>
                    <span class="bfilter-count" id="count-forgeron_lingots"></span>
                  </label>
                  <label class="bfilter-row bfilter-sub">
                    <input type="checkbox" class="pnj-tag-filter-cb" value="fabricant_cles" checked />
                    <span class="bfilter-label">de Clés</span>
                    <span class="bfilter-count" id="count-fabricant_cles"></span>
                  </label>
                  <label class="bfilter-row bfilter-sub">
                    <input type="checkbox" class="pnj-tag-filter-cb" value="fabricant_secrets" checked />
                    <span class="bfilter-label">d'Items Secrets</span>
                    <span class="bfilter-count" id="count-fabricant_secrets"></span>
                  </label>
                  <label class="bfilter-row bfilter-sub">
                    <input type="checkbox" class="pnj-tag-filter-cb" value="refaconneur" checked />
                    <span class="bfilter-label">Refaçonneur</span>
                    <span class="bfilter-count" id="count-refaconneur"></span>
                  </label>
                </div>
              </div>

              <!-- ── Marchands ── -->
              <div class="pnj-cat-group">
                <div class="pnj-cat-header" data-cat="marchand">
                  <span class="pnj-cat-arrow open">▶</span>
                  <span class="bfilter-dot bfilter-marchand"></span>
                  <span class="pnj-cat-title">Marchands</span>
                  <span class="bfilter-count" id="group-count-marchand"></span>
                </div>
                <div class="pnj-cat-body open pnj-cat-marchand" id="group-body-marchand">
                  <label class="bfilter-row bfilter-sub">
                    <input type="checkbox" class="pnj-tag-filter-cb" value="marchand_equipement" checked />
                    <span class="bfilter-label">d'Équipement</span>
                    <span class="bfilter-count" id="count-marchand_equipement"></span>
                  </label>
                  <label class="bfilter-row bfilter-sub">
                    <input type="checkbox" class="pnj-tag-filter-cb" value="marchand_consommable" checked />
                    <span class="bfilter-label">de Consommable</span>
                    <span class="bfilter-count" id="count-marchand_consommable"></span>
                  </label>
                  <label class="bfilter-row bfilter-sub">
                    <input type="checkbox" class="pnj-tag-filter-cb" value="marchand_outils" checked />
                    <span class="bfilter-label">d'Outils</span>
                    <span class="bfilter-count" id="count-marchand_outils"></span>
                  </label>
                  <label class="bfilter-row bfilter-sub">
                    <input type="checkbox" class="pnj-tag-filter-cb" value="marchand_accessoires" checked />
                    <span class="bfilter-label">d'Accessoires</span>
                    <span class="bfilter-count" id="count-marchand_accessoires"></span>
                  </label>
                  <label class="bfilter-row bfilter-sub">
                    <input type="checkbox" class="pnj-tag-filter-cb" value="marchand_itinerant" checked />
                    <span class="bfilter-label">Itinérant</span>
                    <span class="bfilter-count" id="count-marchand_itinerant"></span>
                  </label>
                  <label class="bfilter-row bfilter-sub">
                    <input type="checkbox" class="pnj-tag-filter-cb" value="repreneur_butin" checked />
                    <span class="bfilter-label">Repreneur de Butin</span>
                    <span class="bfilter-count" id="count-repreneur_butin"></span>
                  </label>
                </div>
              </div>

              <!-- ── Standalone ── -->
              <label class="bfilter-row">
                <input type="checkbox" class="pnj-tag-filter-cb" value="bucheron" checked />
                <span class="bfilter-dot bfilter-bucheron"></span>
                <span class="bfilter-label">Bûcheron</span>
                <span class="bfilter-count" id="count-bucheron"></span>
              </label>
              <label class="bfilter-row">
                <input type="checkbox" class="pnj-tag-filter-cb" value="alchimiste" checked />
                <span class="bfilter-dot bfilter-alchimiste"></span>
                <span class="bfilter-label">Alchimiste</span>
                <span class="bfilter-count" id="count-alchimiste"></span>
              </label>
              <label class="bfilter-row">
                <input type="checkbox" class="pnj-tag-filter-cb" value="quetes" checked />
                <span class="bfilter-dot bfilter-quetes"></span>
                <span class="bfilter-label">Quêtes</span>
                <span class="bfilter-count" id="count-quetes"></span>
              </label>
              <label class="bfilter-row">
                <input type="checkbox" class="pnj-tag-filter-cb" value="autre" checked />
                <span class="bfilter-dot bfilter-autre"></span>
                <span class="bfilter-label">Autre</span>
                <span class="bfilter-count" id="count-autre"></span>
              </label>

            </div>
          </div>
        </div>

        <!-- ─ Le filtre Comportement a été retiré ─ -->

      </div><!-- /sidebar-scroll -->
    </aside>

    <!-- ══ ZONE PRINCIPALE ══ -->
    <main class="bestiaire-main">
      <div class="bestiaire-main-header">
        <div>
          <h1 class="bestiaire-title" id="main-title">Bestiaire</h1>
          <p class="bestiaire-subtitle" id="main-subtitle">// MONSTRES · VEILLEURS AU CLAIR DE LUNE</p>
        </div>
        <span id="result-count" class="result-count"></span>
      </div>

      <div id="entity-grid" class="entity-grid"></div>

      <div id="grid-empty" class="grid-empty" style="display:none;">
        <div class="grid-empty-icon">🐗</div>
        <div class="grid-empty-text">Aucun résultat</div>
      </div>
    </main>

  </div>

  <!-- ══════ MODAL ══════ -->
  <div class="mob-modal-overlay" id="mob-modal-overlay">
    <div class="mob-modal" id="mob-modal" role="dialog" aria-modal="true">
      <button class="modal-close-btn" id="modal-close-btn" title="Fermer (Échap)">✕</button>
      <div class="mob-modal-scroll">
        <div id="mob-modal-content"></div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="../Compendium/data.js"></script>
  <script src="mob_data.js"></script>
  <script src="data.js"></script>
  <script src="monstre-viewer.js"></script>
  <script src="bestiaire.js"></script>
</body>
</html>
