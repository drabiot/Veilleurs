<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>VCL — Data Linter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0e0e14; color: #ccc; font-family: 'JetBrains Mono', monospace, sans-serif; font-size: 13px; padding: 24px; }
    h1 { color: #fff; font-size: 20px; margin-bottom: 4px; }
    .subtitle { color: #666; font-size: 12px; margin-bottom: 24px; }
    .summary-bar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 28px; }
    .stat-pill { padding: 6px 14px; border-radius: 20px; font-weight: 700; font-size: 13px; }
    .pill-ok    { background: #1a3320; color: #59d059; border: 1px solid #59d05944; }
    .pill-warn  { background: #332a10; color: #e8d44a; border: 1px solid #e8d44a44; }
    .pill-error { background: #2e1010; color: #e85050; border: 1px solid #e8505044; }

    .section { margin-bottom: 20px; }
    .section-header {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; border-radius: 6px 6px 0 0;
      cursor: pointer; user-select: none;
      font-weight: 700; font-size: 13px;
    }
    .section-header.error { background: #2e1010; color: #e85050; }
    .section-header.warn  { background: #2b2108; color: #e8d44a; }
    .section-header.ok    { background: #121e14; color: #59d059; }
    .section-header .count { margin-left: auto; opacity: .7; font-weight: 400; }
    .section-header .chevron { transition: transform .15s; }
    .section-header.collapsed .chevron { transform: rotate(-90deg); }

    .section-body { border: 1px solid #222; border-top: none; border-radius: 0 0 6px 6px; overflow: hidden; }
    .issue-row {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 0;
      border-bottom: 1px solid #1a1a22;
    }
    .issue-row:last-child { border-bottom: none; }
    .issue-id { padding: 7px 12px; color: #a07ae8; font-size: 12px; border-right: 1px solid #1a1a22; word-break: break-all; }
    .issue-msg { padding: 7px 12px; color: #ccc; font-size: 12px; line-height: 1.5; }
    .issue-msg b { color: #fff; }
    .issue-msg .tag { display: inline-block; background: #1e1e2e; border: 1px solid #333; border-radius: 3px; padding: 0 5px; font-size: 11px; margin: 0 2px; }
    .empty-ok { padding: 10px 14px; color: #59d05988; font-size: 12px; }

    #loading { color: #666; font-size: 14px; padding: 40px 0; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
</head>
<body>

<h1>VCL Data Linter</h1>
<p class="subtitle" id="linter-subtitle">Chargement des données…</p>

<div class="summary-bar" id="summary-bar"></div>
<div id="results"></div>

<!-- Charger les mêmes fichiers que le compendium -->
<script src="Compendium/data.js"></script>
<script src="Bestiaire/mob_data.js"></script>

<script>
function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Constantes de validation ───────────────────────────────────────────────

const VALID_RARITIES   = new Set(Object.keys(RARITIES));
const VALID_CATEGORIES = new Set(Object.keys(CATEGORIES));
const VALID_CLASSES    = new Set(CLASSES.map(c => c.id));
const VALID_STATS      = new Set(ALL_STATS.map(s => s.id));
const VALID_SETS       = new Set(Object.keys(SETS));
const VALID_EFFECTS    = new Set(Object.keys(EFFECT_META));

const RARITY_TAG_MAP = {
  commun:'Commun', rare:'Rare', epique:'Épique',
  legendaire:'Légendaire', mythique:'Mythique', godlike:'Godlike', event:'Event'
};
const PALIER_TAG_MAP = { 1:'Palier 1', 2:'Palier 2', 3:'Palier 3' };

// Slots valides par catégorie
const VALID_SLOTS_BY_CAT = {
  arme:       new Set(['arme_p','arme_s']),
  armure:     new Set(['casque','plastron','jambières','bottes']),
  accessoire: new Set(['anneau','amulette','bracelet','artefact','gants']),
};

// IDs de tous les items (pour vérifier les crafts)
const ALL_ITEM_IDS = new Set(ITEMS.map(i => i.id));
// Ajoute 'cols' et autres ressources connues qui ne sont pas forcément des items
const KNOWN_CURRENCY_IDS = new Set(Object.keys(CURRENCIES));

// ─── Résultats ───────────────────────────────────────────────────────────────

const issues = {
  doublons:        { label:'IDs en double',                   sev:'error', items:[] },
  requis:          { label:'Champs requis manquants',         sev:'error', items:[] },
  rarity:          { label:'Rareté invalide',                 sev:'error', items:[] },
  category:        { label:'Catégorie invalide',              sev:'error', items:[] },
  cat_slot:        { label:'Slot incohérent avec catégorie',  sev:'error', items:[] },
  stat_unknown:    { label:'Stats inconnues',                 sev:'error', items:[] },
  stat_range:      { label:'Range de stats invalide',         sev:'error', items:[] },
  set_unknown:     { label:'Set inexistant',                  sev:'error', items:[] },
  classes:         { label:'Classe invalide',                 sev:'error', items:[] },
  effect_unknown:  { label:'Effets inconnus',                 sev:'error', items:[] },
  sensible_wrong:  { label:'sensible:true dans data.js',      sev:'warn',  items:[] },
  craft_unknown:   { label:'IDs orphelins (craft)',           sev:'warn',  items:[] },
  lvl_invalid:     { label:'Level invalide (≤0 ou >MAX)',     sev:'warn',  items:[] },
  tag_rarity:      { label:'Tag rareté ≠ champ rarity',       sev:'warn',  items:[] },
  tag_palier:      { label:'Tag palier ≠ champ palier',       sev:'warn',  items:[] },
  tag_typo:        { label:'Typo dans tags ("Armes"…)',        sev:'warn',  items:[] },
  obtain_empty:    { label:'obtain vide ou manquant',         sev:'warn',  items:[] },
  lore_empty:      { label:'lore vide ou manquant',           sev:'warn',  items:[] },
  img_missing:     { label:'img null (arme/armure/accessoire)', sev:'warn', items:[] },
};

// ─── Vérification des doublons ───────────────────────────────────────────────

const idSeen = new Map();
for (const item of ITEMS) {
  if (!item.id) continue;
  if (idSeen.has(item.id)) {
    issues.doublons.items.push({ id: item.id, msg: `Apparaît au moins 2 fois` });
  }
  idSeen.set(item.id, true);
}

// Pour savoir si item vient de data_sensible on regarde le flag sensible
// (data.js ne doit pas avoir sensible:true)
// On ne peut pas distinguer les fichiers sources depuis le browser une fois mergés,
// donc on se base sur le flag

// ─── Analyse de chaque item ──────────────────────────────────────────────────

for (const item of ITEMS) {
  const id = item.id || '(sans id)';

  // Champs requis
  const missing = [];
  if (!item.id)       missing.push('id');
  if (!item.name)     missing.push('name');
  if (!item.rarity)   missing.push('rarity');
  if (!item.category) missing.push('category');
  if (!item.palier)   missing.push('palier');
  const catHasLvl = ['arme','armure','accessoire'].includes(item.category);
  if (catHasLvl && item.lvl == null) missing.push('lvl');
  if (missing.length) {
    issues.requis.items.push({ id, msg: `Manque : <b>${missing.join(', ')}</b>` });
  }

  // Rareté invalide
  if (item.rarity && !VALID_RARITIES.has(item.rarity)) {
    issues.rarity.items.push({ id, msg: `"<b>${item.rarity}</b>" n'est pas une rareté valide` });
  }

  // Catégorie invalide
  if (item.category && !VALID_CATEGORIES.has(item.category)) {
    issues.category.items.push({ id, msg: `"<b>${item.category}</b>" n'est pas une catégorie valide` });
  }

  // Slot (cat) incohérent avec catégorie
  if (item.cat && item.category && VALID_SLOTS_BY_CAT[item.category]) {
    if (!VALID_SLOTS_BY_CAT[item.category].has(item.cat)) {
      issues.cat_slot.items.push({ id, msg: `cat="<b>${item.cat}</b>" invalide pour category="${item.category}"` });
    }
  }

  // Stats inconnues + range invalide
  if (item.stats) {
    for (const [key, val] of Object.entries(item.stats)) {
      if (!VALID_STATS.has(key)) {
        issues.stat_unknown.items.push({ id, msg: `Stat inconnue : <b>${key}</b>` });
      }
      if (Array.isArray(val)) {
        if (val.length !== 2 || val[0] >= val[1]) {
          issues.stat_range.items.push({ id, msg: `<b>${key}</b>: range [${val.join(', ')}] invalide (min ≥ max ou mauvaise longueur)` });
        }
      }
    }
  }

  // Set inexistant
  if (item.set && !VALID_SETS.has(item.set)) {
    issues.set_unknown.items.push({ id, msg: `Set "<b>${item.set}</b>" introuvable dans SETS` });
  }

  // Classes invalides
  if (item.classes) {
    for (const cls of item.classes) {
      if (!VALID_CLASSES.has(cls)) {
        issues.classes.items.push({ id, msg: `Classe invalide : <b>${cls}</b>` });
      }
    }
  }

  // Effets inconnus
  if (item.effects) {
    for (const eff of item.effects) {
      if (eff.type && !VALID_EFFECTS.has(eff.type)) {
        issues.effect_unknown.items.push({ id, msg: `Effet inconnu : <b>${eff.type}</b>` });
      }
    }
  }

  // sensible:true dans data.js (heuristique: pas de sensible:true attendu dans data normal)
  // Comme les deux fichiers sont mergés, on ne peut pas distinguer la source,
  // mais on peut noter si sensible est false/absent pour un item dans data_sensible
  // (On skip cette vérification sans accès à la source)

  // Craft IDs inconnus
  if (item.craft) {
    for (const c of item.craft) {
      if (c.id && !ALL_ITEM_IDS.has(c.id) && !KNOWN_CURRENCY_IDS.has(c.id)) {
        if (!issues.craft_unknown.items.some(x => x.id === c.id)) {
          issues.craft_unknown.items.push({ id: c.id, msg: `"<b>${c.id}</b>" introuvable dans ITEMS` });
        }
      }
    }
  }

  // Level invalide (seulement pour arme/armure/accessoire)
  if (catHasLvl && item.lvl != null) {
    if (item.lvl <= 0 || item.lvl > MAX_LEVEL) {
      issues.lvl_invalid.items.push({ id, msg: `lvl=<b>${item.lvl}</b> hors range [1, ${MAX_LEVEL}]` });
    }
  }

  // Tags — rareté incohérente
  if (item.tags && item.rarity && RARITY_TAG_MAP[item.rarity]) {
    const expectedRarityTag = RARITY_TAG_MAP[item.rarity];
    const hasAnyRarityTag = Object.values(RARITY_TAG_MAP).some(t => item.tags.includes(t));
    if (hasAnyRarityTag && !item.tags.includes(expectedRarityTag)) {
      const found = Object.values(RARITY_TAG_MAP).filter(t => item.tags.includes(t));
      issues.tag_rarity.items.push({ id, msg: `Tag rareté <span class="tag">${found.join(', ')}</span> ≠ rarity="${item.rarity}" (attendu <span class="tag">${expectedRarityTag}</span>)` });
    }
  }

  // Tags — palier incohérent
  if (item.tags && item.palier != null && PALIER_TAG_MAP[item.palier]) {
    const expectedPalierTag = PALIER_TAG_MAP[item.palier];
    const hasAnyPalierTag = Object.values(PALIER_TAG_MAP).some(t => item.tags.includes(t));
    if (hasAnyPalierTag && !item.tags.includes(expectedPalierTag)) {
      const found = Object.values(PALIER_TAG_MAP).filter(t => item.tags.includes(t));
      issues.tag_palier.items.push({ id, msg: `Tag palier <span class="tag">${found.join(', ')}</span> ≠ palier=${item.palier} (attendu <span class="tag">${expectedPalierTag}</span>)` });
    }
  }

  // Tags — typos connues ("Armes" au lieu de "Arme")
  if (item.tags) {
    const typos = ['Armes', 'Armures', 'Accessoires'];
    const found = item.tags.filter(t => typos.includes(t));
    if (found.length) {
      issues.tag_typo.items.push({ id, msg: `Tag suspect : <span class="tag">${found.join(', ')}</span> (pluriel ?)` });
    }
  }

  // obtain vide
  const catNeedsObtain = ['arme','armure','accessoire','materiaux','ressources'];
  if (catNeedsObtain.includes(item.category)) {
    if (!item.obtain || item.obtain.trim() === '') {
      issues.obtain_empty.items.push({ id, msg: `obtain vide pour category="${item.category}"` });
    }
  }

  // lore vide
  const catNeedsLore = ['arme','armure','accessoire'];
  if (catNeedsLore.includes(item.category)) {
    if (!item.lore || item.lore.trim() === '') {
      issues.lore_empty.items.push({ id, msg: `lore vide pour category="${item.category}"` });
    }
  }

  // img null pour équipement (warn)
  const catNeedsImg = ['arme','armure','accessoire'];
  if (catNeedsImg.includes(item.category) && !item.img) {
    issues.img_missing.items.push({ id, msg: `img=null pour un item de type "${item.category}"` });
  }
}

// ─── Rendu ───────────────────────────────────────────────────────────────────

function toggleSection(header) {
  header.classList.toggle('collapsed');
  header.nextElementSibling.style.display = header.classList.contains('collapsed') ? 'none' : '';
}

const totalErrors = Object.values(issues).filter(s => s.sev === 'error').reduce((a,b) => a + b.items.length, 0);
const totalWarns  = Object.values(issues).filter(s => s.sev === 'warn').reduce((a,b) => a + b.items.length, 0);

document.getElementById('linter-subtitle').textContent =
  `${ITEMS.length} items analysés · ${new Date().toLocaleTimeString('fr-FR')}`;

const bar = document.getElementById('summary-bar');
bar.innerHTML = `
  <div class="stat-pill pill-ok">📦 ${ITEMS.length} items</div>
  ${totalErrors ? `<div class="stat-pill pill-error">❌ ${totalErrors} erreur${totalErrors>1?'s':''}</div>` : '<div class="stat-pill pill-ok">✅ 0 erreur</div>'}
  ${totalWarns  ? `<div class="stat-pill pill-warn">⚠️ ${totalWarns} avertissement${totalWarns>1?'s':''}</div>` : '<div class="stat-pill pill-ok">✅ 0 avertissement</div>'}
`;

const results = document.getElementById('results');

for (const [key, section] of Object.entries(issues)) {
  const count = section.items.length;
  const sev = count === 0 ? 'ok' : section.sev;

  const sec = document.createElement('div');
  sec.className = 'section';

  const header = document.createElement('div');
  header.className = `section-header ${sev}`;
  if (count === 0) header.classList.add('collapsed');
  header.innerHTML = `
    <span class="chevron">▼</span>
    <span>${section.label}</span>
    <span class="count">${count} problème${count !== 1 ? 's' : ''}</span>
  `;
  header.onclick = () => toggleSection(header);
  sec.appendChild(header);

  const body = document.createElement('div');
  body.className = 'section-body';
  if (count === 0) body.style.display = 'none';

  if (count === 0) {
    body.innerHTML = `<div class="empty-ok">✓ Aucun problème détecté</div>`;
  } else {
    for (const issue of section.items) {
      const row = document.createElement('div');
      row.className = 'issue-row';
      row.innerHTML = `<div class="issue-id">${escHtml(issue.id)}</div><div class="issue-msg">${escHtml(issue.msg)}</div>`;
      body.appendChild(row);
    }
  }

  sec.appendChild(body);
  results.appendChild(sec);
}
</script>
</body>
</html>
