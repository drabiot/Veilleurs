<head>
  <meta charset="UTF-8" />

  <link rel="stylesheet" href="map.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />

<body class="map-page">

  <!-- Fond ambiant -->
  <div class="ambient-bg" aria-hidden="true">
    <div class="moon"></div>
    <div class="fog fog-1"></div>
    <div class="fog fog-2"></div>
    <div class="vignette"></div>
  </div>

  <!-- ══════ HEADER ══════ -->
  <header class="site-header">
    <div class="header-top">
      <div class="header-left">
        <div class="traffic-lights">
          <span class="tl tl-red"></span>
          <span class="tl tl-yellow"></span>
          <span class="tl tl-green"></span>
        </div>
        <span class="header-sep">─────</span>
        <a href="../index.html" class="header-logo">Veilleurs au Clair de Lune</a>
      </div>
      <div class="header-right">
        <a href="../creator.html?mode=item" class="btn-add-item">+ Ajouter un item</a>
      </div>
    </div>
    <nav class="header-nav">
      <a href="../Patchnotes/patchnotes.html" class="nav-link">
        <span class="nav-icon">📜</span>
        <span class="nav-label">Patchnotes</span>
      </a>
      <a href="../Map/map2.html" class="nav-link active">
        <span class="nav-icon">🗺️</span>

        <span class="nav-icon">📋</span>

      <a href="../Atelier/atelier.html" class="nav-link"><span class="nav-icon">🔨</span><span class="nav-label">Atelier</span></a>
    </nav>
  </header>

  <!-- ══════ MAP LAYOUT ══════ -->
  <div class="map-layout">

    <!-- ── Sidebar gauche ── -->
    <aside class="map-sidebar">
      <div class="sidebar-title">Légende</div>
      <div class="legend-filters" id="legend-filters">
        <label class="legend-item legend-toggle-all">
          <input type="checkbox" id="toggle-all-filters" unchecked />
          <span class="legend-emoji" style="background:#333;">⚙️</span>
          <span>Tout sélectionner</span>
        </label>
        <div class="sidebar-sep"></div>

        <label class="legend-item">
          <input type="checkbox" class="marker-filter" data-type="région" checked />
          <span class="legend-emoji" style="background:#e8c8c8;">📍</span>
          <span>Régions</span>
        </label>
        <label class="legend-item">
          <input type="checkbox" class="marker-filter" data-type="donjon" checked />
          <span class="legend-emoji" style="background:#c47a6a;">⚔️</span>
          <span>Donjon</span>
        </label>
        <label class="legend-item">
          <input type="checkbox" class="marker-filter" data-type="boss" />
          <span class="legend-emoji" style="background:#6b1a1a;">☠️</span>
          <span>Boss</span>
        </label>
        <label class="legend-item">
          <input type="checkbox" class="marker-filter" data-type="zone_monstre" />
          <span class="legend-emoji" style="background:#7a3030;">💀</span>
          <span>Monstres</span>
        </label>

        <div class="sidebar-sep"></div>
        <div class="sidebar-title" style="font-size:10px;padding:2px 0;">— Quêtes —</div>
        <label class="legend-item">
          <input type="checkbox" class="marker-filter" data-type="quête_principale" />
          <span class="legend-emoji" style="background:#b8893a;">💬</span>
          <span>Quête Principale</span>
        </label>
        <label class="legend-item">
          <input type="checkbox" class="marker-filter" data-type="quête_secondaire" />
          <span class="legend-emoji" style="background:#d4b57e;">❓</span>
          <span>Quête Secondaire</span>
        </label>
        <label class="legend-item">
          <input type="checkbox" class="marker-filter" data-type="quête_tertiaire" />
          <span class="legend-emoji" style="background:#a89060;">📋</span>
          <span>Quête Tertiaire</span>
        </label>

        <div class="sidebar-sep"></div>
        <div class="sidebar-title" style="font-size:10px;padding:2px 0;">— Craft —</div>
        <label class="legend-item">
          <input type="checkbox" class="marker-filter" data-type="craft_armes" />
          <span class="legend-emoji" style="background:#6a4daa;">⚒️</span>
          <span>Forgeron d'Armes</span>
        </label>
        <label class="legend-item">
          <input type="checkbox" class="marker-filter" data-type="craft_armures" />
          <span class="legend-emoji" style="background:#5a3d9a;">🛡️</span>
          <span>Forgeron d'Armures</span>
        </label>
        <label class="legend-item">
          <input type="checkbox" class="marker-filter" data-type="craft_accessoires" />
          <span class="legend-emoji" style="background:#7a5dba;">💍</span>
          <span>Forgeron d'Access.</span>
        </label>
        <label class="legend-item">
          <input type="checkbox" class="marker-filter" data-type="craft_cles" />
          <span class="legend-emoji" style="background:#f1dd6a;">🗝️</span>
          <span>Forgeron de Clés</span>
        </label>

        <div class="sidebar-sep"></div>
        <div class="sidebar-title" style="font-size:10px;padding:2px 0;">— Artisans —</div>
        <label class="legend-item">
          <input type="checkbox" class="marker-filter" data-type="craft_lingots" />
          <span class="legend-emoji" style="background:#8a6dca;">🔩</span>
          <span>Forgeron de Lingots</span>
        </label>
        <label class="legend-item">
          <input type="checkbox" class="marker-filter" data-type="alchimiste" />
          <span class="legend-emoji" style="background:#3d1f6e;">⚗️</span>
          <span>Alchimiste</span>
        </label>
        <label class="legend-item">
          <input type="checkbox" class="marker-filter" data-type="bucheron" />
          <span class="legend-emoji" style="background:#1a4a1a;">🪓</span>
          <span>Bûcheron</span>
        </label>
        <label class="legend-item">
          <input type="checkbox" class="marker-filter" data-type="refaconneur" />
          <span class="legend-emoji" style="background:#a16207;">🔧</span>
          <span>Refaçonneur</span>
        </label>

        <div class="sidebar-sep"></div>
        <div class="sidebar-title" style="font-size:10px;padding:2px 0;">— Commerce —</div>
        <label class="legend-item">
          <input type="checkbox" class="marker-filter" data-type="repreneur_butin" />
          <span class="legend-emoji" style="background:#153f55;">🛒</span>
          <span>Repreneur de Butin</span>
        </label>
        <label class="legend-item">
          <input type="checkbox" class="marker-filter" data-type="repreneur_armes" />
          <span class="legend-emoji" style="background:#1a4f6a;">⚔️</span>
          <span>Repreneur d'Armes</span>
        </label>
        <label class="legend-item">
          <input type="checkbox" class="marker-filter" data-type="marchand_itinerant" />
          <span class="legend-emoji" style="background:#3a6e8a;">💰</span>
          <span>Marchand Itinérant</span>
        </label>
        <label class="legend-item">
          <input type="checkbox" class="marker-filter" data-type="marchand_equipement" />
          <span class="legend-emoji" style="background:#1e3a6a;">⚔️</span>
          <span>Marchand d'Équip.</span>
        </label>
        <label class="legend-item">
          <input type="checkbox" class="marker-filter" data-type="marchand_consommable" />
          <span class="legend-emoji" style="background:#1e4a3a;">🧪</span>
          <span>Marchand Consommable</span>
        </label>
        <label class="legend-item">
          <input type="checkbox" class="marker-filter" data-type="marchand_outils" />
          <span class="legend-emoji" style="background:#3a3a1e;">🔧</span>
          <span>Marchand d'Outils</span>
        </label>
        <label class="legend-item">
          <input type="checkbox" class="marker-filter" data-type="marchand_access" />
          <span class="legend-emoji" style="background:#4a1e4a;">💍</span>
          <span>Marchand d'Access.</span>
        </label>
        <label class="legend-item">
          <input type="checkbox" class="marker-filter" data-type="marchand_occulte" />
          <span class="legend-emoji" style="background:#1a1a2e;">🌑</span>
          <span>Marchand Occulte</span>
        </label>

        <div class="sidebar-sep"></div>
        <label class="legend-item">
          <input type="checkbox" class="marker-filter" data-type="autre" />
          <span class="legend-emoji" style="background:#56d476;">🦠</span>
          <span>Autre</span>
        </label>
      </div>

      <div class="sidebar-sep"></div>
      <div class="sidebar-title">Étage actuel</div>
      <div class="floor-info">
        <span class="floor-info-num" id="floor-info-num">1</span>
        <span class="floor-info-label">/ 100</span>
      </div>
      <div class="sidebar-sep"></div>
      <div class="sidebar-title">Zoom</div>
      <div class="zoom-controls">
        <button class="zoom-btn" id="zoom-out">-</button>
        <span class="zoom-level" id="zoom-level">100%</span>
        <button class="zoom-btn" id="zoom-in">+</button>
        <button class="zoom-btn zoom-reset" id="zoom-reset">⟳</button>
      </div>
    </aside>

    <!-- ── Zone centrale ── -->
    <main class="map-main">

      <div class="map-topbar">
        <span class="map-topbar-label">ÉTAGE</span>
        <span class="map-topbar-num" id="floor-display">01</span>
        <span class="map-topbar-name" id="floor-name-display">Forêt</span>
      </div>
      <div class="map-searchbar">
        <input type="text" id="search-input" class="search-input" placeholder="🔍  Rechercher un marqueur…" autocomplete="off" />
        <div class="search-results hidden" id="search-results"></div>
      </div>

      <!-- Viewport -->
      <div class="map-viewport" id="map-viewport">
        <div class="map-canvas" id="map-canvas">
          <img id="map-svg" src="" data-missing="true" width="900" height="900" alt="Carte" draggable="false" />
        </div>
        <div class="markers-layer" id="markers-layer"></div>
      </div>

      <!-- Tooltip -->
      <div class="map-tooltip hidden" id="map-tooltip">
        <div class="tooltip-type" id="tooltip-type"></div>
        <div class="tooltip-name" id="tooltip-name"></div>
        <div class="tooltip-desc" id="tooltip-desc"></div>
        <a class="tooltip-link hidden" id="tooltip-link" href="#" target="_blank">Voir le guide →</a>
      </div>

    </main>

    <!-- ── Molette droite ── -->
    <div class="floor-wheel-panel">
      <button class="wheel-btn wheel-up" id="wheel-up" title="Étage suivant">▲</button>
      <div class="wheel-display">
        <div class="wheel-track" id="wheel-track"></div>
      </div>
      <div class="wheel-current">
        <input type="text" id="floor-input" class="floor-input" value="1" maxlength="3"
               title="Tapez un numéro d'étage" aria-label="Numéro d'étage" />
        <span class="wheel-current-label">étage</span>
      </div>
      <button class="wheel-btn wheel-down" id="wheel-down" title="Étage précédent">▼</button>
    </div>

  </div>

  <script src="../utils.js"></script>
  <script src="data.js"></script>
  <script type="module">
    import { store } from '../store.js';
    import { db }    from '../firebase.js';
    import { getDoc, doc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
    await store.load(['pnj', 'regions', 'mobs', 'quetes', 'donjons', 'zones', 'mapMarkers']);
    window._map2_pnj        = store.pnj;
    window._map2_regions    = store.regions;
    window._map2_mobs       = store.mobs;
    window._map2_quetes     = store.quetes;
    window._map2_donjons    = store.donjons;
    window._map2_zones      = store.zones;
    window._map2_mapMarkers = store.mapMarkers;
    try {
      const colorSnap = await getDoc(doc(db, 'config', 'pin_type_colors'));
      window._map2_pin_colors = colorSnap.exists() ? colorSnap.data() : {};
    } catch { window._map2_pin_colors = {}; }
    window._map2DataLoaded = true;
    window._map2Ready?.();
  </script>
  <script src="map2.js"></script>
</body>
</html>
