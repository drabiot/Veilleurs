<body class="quetes-page">

  <!-- Fond ambiant -->

    <div class="moon"></div>
    <div class="fog fog-1"></div>
    <div class="fog fog-2"></div>

  <!-- ══════ HEADER ══════ -->

    <div class="header-top">
      <div class="header-left">
        <div class="traffic-lights">
          <span class="tl tl-red"></span>
          <span class="tl tl-yellow"></span>
          <span class="tl tl-green"></span>
        </div>
        <span class="header-sep">─────</span>
        <a href="../index.html" class="header-logo">Veilleurs au Clair de Lune</a>
      </div>
      <div class="header-right">
        <a href="../creator.html" class="btn-add-item">+ Ajouter un item</a>
      </div>
    </div>
    <nav class="header-nav">
      <a href="../index.html" class="nav-link"><span class="nav-icon">📜</span><span class="nav-label">Patchnotes</span></a>
      <a href="../Map/map.html" class="nav-link"><span class="nav-icon">🗺️</span><span class="nav-label">Carte</span></a>
      <a href="../Compendium/compendium.html" class="nav-link"><span class="nav-icon">📖</span><span class="nav-label">Compendium</span></a>
      <a href="../Bestiaire/bestiaire.html" class="nav-link"><span class="nav-icon">💀</span><span class="nav-label">Bestiaire</span></a>
      <a href="quetes.html" class="nav-link active"><span class="nav-icon">📋</span><span class="nav-label">Quêtes</span></a>
      <a href="../Atelier/atelier.html" class="nav-link"><span class="nav-icon">🔨</span><span class="nav-label">Atelier</span></a>
    </nav>
  </header>

  <!-- ══════ LAYOUT ══════ -->
  <div class="quetes-layout">

    <!-- ══ SIDEBAR ══ -->
    <aside class="quetes-sidebar">

      <div class="sidebar-search">
        <input type="text" id="sidebar-search" placeholder="🔍  Rechercher…" autocomplete="off" />
      </div>

      <div class="sidebar-sort-bar">
        <button class="sort-btn active" data-tab="main">
          <span class="sort-icon">🔥</span><span class="sort-label">Princi.</span>
        </button>
        <button class="sort-btn" data-tab="sec">
          <span class="sort-icon">💬</span><span class="sort-label">Second.</span>
        </button>
        <button class="sort-btn" data-tab="ter">
          <span class="sort-icon">❓</span><span class="sort-label">Terti.</span>
        </button>
        <button class="sort-btn" data-tab="inv" id="inv-tab-btn">
          <span class="sort-icon">🎒</span><span class="sort-label">Inv.</span>
        </button>
      </div>

      <!-- Filtres quêtes -->
      <div id="sidebar-scroll" class="sidebar-scroll">

        <div class="filter-block">
          <div class="filter-block-header open" id="palier-block-header">
            <span class="palier-label">⬡ Palier</span>
            <span class="palier-arrow">▶</span>
          </div>
          <div class="filter-block-body open" id="palier-block-body">
            <div id="palier-filters"></div>
          </div>
        </div>

        <div class="filter-block">
          <div class="filter-block-header open" id="zone-block-header">
            <span class="palier-label">🗺 Zone</span>
            <span class="palier-arrow">▶</span>
          </div>
          <div class="filter-block-body open" id="zone-block-body">
            <div class="bfilter-list" id="zone-filters"></div>
          </div>
        </div>

        <div class="filter-block">
          <div class="filter-block-header open" id="statut-block-header">
            <span class="palier-label">✅ Statut</span>
            <span class="palier-arrow">▶</span>
          </div>
          <div class="filter-block-body open" id="statut-block-body">
            <div class="bfilter-list">
              <label class="bfilter-row">
                <input type="radio" name="statut-filter" value="all" checked />
                <span class="bfilter-dot dot-all"></span>
                <span class="bfilter-label">Toutes</span>
                <span class="bfilter-count" id="cnt-all"></span>
              </label>
              <label class="bfilter-row">
                <input type="radio" name="statut-filter" value="todo" />
                <span class="bfilter-dot dot-todo"></span>
                <span class="bfilter-label">À faire</span>
                <span class="bfilter-count" id="cnt-todo"></span>
              </label>
              <label class="bfilter-row">
                <input type="radio" name="statut-filter" value="done" />
                <span class="bfilter-dot dot-done"></span>
                <span class="bfilter-label">Terminées</span>
                <span class="bfilter-count" id="cnt-done"></span>
              </label>
            </div>
          </div>
        </div>

      </div><!-- /sidebar-scroll -->

      <!-- Panneau inventaire -->
      <div id="inv-sidebar" class="sidebar-scroll" style="display:none;flex:1;overflow-y:auto;">
        <div class="filter-block">
          <div class="filter-block-header open" id="inv-block-header">
            <span class="palier-label">🎒 Mes Items</span>
            <span class="palier-arrow">▶</span>
          </div>
          <div class="filter-block-body open" id="inv-block-body">
            <div id="inv-panel"></div>
          </div>
        </div>
        <div id="feasible-panel"></div>
      </div>

    </aside>

    <!-- ══ MAIN ══ -->
    <main class="quetes-main">
      <div class="quetes-main-header">
        <div>
          <h1 class="quetes-title" id="main-title">Quêtes Principales</h1>
          <p class="quetes-subtitle" id="main-subtitle">// PRINCIPALES · VEILLEURS AU CLAIR DE LUNE</p>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
          <select id="quest-sort" class="quest-sort">
            <option value="default">Ordre par défaut</option>
            <option value="profit">💰 Rentabilité (XP + Cols)</option>
            <option value="exp">✨ XP décroissante</option>
            <option value="cols">🪙 Cols décroissants</option>
            <option value="alpha-asc">🔤 A → Z</option>
            <option value="alpha-desc">🔤 Z → A</option>
          </select>
          <span id="result-count" class="result-count"></span>
        </div>
      </div>

      <div id="quete-grid" class="quete-grid"></div>

      <div id="grid-empty" class="grid-empty" style="display:none;">
        <div class="grid-empty-icon">📋</div>
        <div class="grid-empty-text">Aucun résultat</div>
      </div>
    </main>

  </div><!-- /quetes-layout -->

  <!-- ══════ MODAL ══════ -->
  <div class="quest-modal-overlay" id="quest-modal-overlay">
    <div class="quest-modal" role="dialog" aria-modal="true">
      <button class="modal-close-btn" id="modal-close-btn" title="Fermer (Échap)">✕</button>
      <div class="quest-modal-scroll">
        <div id="quest-modal-content"></div>
      </div>
    </div>
  </div>

  <!-- Scripts : data en classique, quetes en classique, loader en module -->
  <script src="../utils.js"></script>
  <script src="data.js"></script>
  <script src="quetes.js"></script>

  <!-- Toggle inventaire (inline, avant le loader) -->
  <script>
    let invMode = false;
    document.getElementById('inv-tab-btn').addEventListener('click', () => {
      invMode = !invMode;
      const scroll   = document.getElementById('sidebar-scroll');
      const invPanel = document.getElementById('inv-sidebar');
      scroll.style.display   = invMode ? 'none' : '';
      invPanel.style.display = invMode ? '' : 'none';

      document.querySelectorAll('.sort-btn').forEach(b =>
        b.classList.remove('active-main','active-sec','active-ter','active-inv')
      );
      if (invMode) {
        document.getElementById('inv-tab-btn').classList.add('active-inv');
        if (typeof buildInventoryPanel === 'function') buildInventoryPanel();
      } else {
        // Restaure l'onglet actif
        const tab = typeof activeTab !== 'undefined' ? activeTab : 'main';
        document.querySelector(`.sort-btn[data-tab="${tab}"]`)?.classList.add(`active-${tab}`);
      }
    });
  </script>

  <!-- Inline module : chargement Firestore via store.js -->
  <script type="module">
    import { store } from '../store.js';

    /* Normalise une quête Firestore pour la rendre compatible avec le format QUETES statique */
    function normalizeFirestoreQuest(q) {
      if (q.type === 'secondary') q.type = 'sec';
      if (q.type === 'tertiary')  q.type = 'ter';
      if (Array.isArray(q.recompenses)) {
        q.recompenses = q.recompenses.map(r => {
          if (r.type === 'exp'  && r.label && r.xp  == null) r.xp   = parseInt(r.label)  || 0;
          if (r.type === 'cols' && r.label && r.cols == null) r.cols = parseInt(r.label) || 0;
          return r;
        });
      }
      if (!Array.isArray(q.objectifs))   q.objectifs   = [];
      if (!Array.isArray(q.recompenses)) q.recompenses = [];
      return q;
    }

    try {
      await store.load(['items', 'mobs', 'quetes', 'regions']);
      DB_ITEMS.push(...store.items);
      DB_MOBS.push(...store.mobs);
      const existingIds = new Set(QUETES.map(q => q.id));
      const newQuetes = store.quetes
        .map(normalizeFirestoreQuest)
        .filter(q => q.id && !existingIds.has(q.id));
      QUETES.push(...newQuetes);
      populateZoneColors(store.regions);
    } catch (err) {
      console.error('[Quêtes] Erreur Firestore :', err);
    }
    window._initQuetes?.();
  </script>

</body>
</html>
