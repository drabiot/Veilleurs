<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modération — VCL Wiki</title>
<style>
:root {
  --bg: #0f0f14; --surface: #1a1a24; --surface2: #22222f; --surface3: #2a2a3a;
  --border: #2e2e42; --accent: #7a5af8; --text: #e8e8f0; --muted: #7a7a90;
  --success: #4ade80; --danger: #f87171; --warn: #fbbf24;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; min-height: 100vh; }

header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 50; }
header h1 { font-size: 17px; font-weight: 700; color: var(--accent); }
.hbtns { margin-left: auto; display: flex; gap: 8px; align-items: center; }

.layout { display: grid; grid-template-columns: 220px 1fr; height: calc(100vh - 49px); }
.sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 16px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
.main { overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }

/* Sidebar filters */
.filter-group { display: flex; flex-direction: column; gap: 4px; }
.filter-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
.filter-btn { padding: 7px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); cursor: pointer; font-size: 12px; text-align: left; transition: all .15s; display: flex; align-items: center; justify-content: space-between; }
.filter-btn:hover { color: var(--text); border-color: var(--accent); }
.filter-btn.active { background: rgba(122,90,248,.15); color: var(--accent); border-color: var(--accent); font-weight: 700; }
.filter-count { font-size: 11px; background: var(--surface3); border-radius: 8px; padding: 1px 6px; }
.filter-btn.active .filter-count { background: var(--accent); color: #fff; }

/* Cards */
.sub-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: border-color .15s; }
.sub-card:hover { border-color: var(--accent); }
.sub-card.status-approved { border-left: 3px solid var(--success); }
.sub-card.status-rejected { border-left: 3px solid var(--danger); opacity: .6; }
.sub-card.status-pending  { border-left: 3px solid var(--warn); }

.sub-head { padding: 12px 14px; background: var(--surface2); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.sub-type { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; padding: 2px 8px; border-radius: 8px; background: var(--surface3); color: var(--muted); }
.sub-name { font-size: 15px; font-weight: 700; color: var(--text); flex: 1; }
.sub-meta { font-size: 11px; color: var(--muted); }
.sub-status { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 10px; }
.sub-status.pending  { background: rgba(251,191,36,.12);  color: var(--warn); border: 1px solid rgba(251,191,36,.3); }
.sub-status.approved { background: rgba(74,222,128,.12);  color: var(--success); border: 1px solid rgba(74,222,128,.3); }
.sub-status.rejected { background: rgba(248,113,113,.12); color: var(--danger);  border: 1px solid rgba(248,113,113,.3); }

.sub-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
.sub-code { background: #0d1117; border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; font-family: 'Consolas', monospace; font-size: 11px; color: #c9d1d9; white-space: pre; overflow-x: auto; max-height: 200px; overflow-y: auto; line-height: 1.6; }
.sub-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.sub-comment { flex: 1; min-width: 200px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 7px 10px; font-size: 12px; font-family: inherit; outline: none; transition: border-color .15s; }
.sub-comment:focus { border-color: var(--accent); }
.review-comment { font-size: 12px; color: var(--muted); font-style: italic; padding: 6px 10px; background: var(--surface2); border-radius: 6px; border-left: 3px solid var(--border); }

/* Editor */
.sub-editor { display: none; flex-direction: column; gap: 6px; }
.sub-editor.open { display: flex; }
.sub-editor-ta { background: #0d1117; border: 1px solid var(--accent); border-radius: 6px; padding: 10px 12px; font-family: 'Consolas', monospace; font-size: 11px; color: #c9d1d9; line-height: 1.6; resize: vertical; min-height: 180px; outline: none; width: 100%; }
.sub-editor-err { font-size: 11px; color: var(--danger); display: none; }

/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: filter .15s; }
.btn:hover { filter: brightness(1.15); }
.btn:disabled { opacity: .4; cursor: default; filter: none; }
.btn-approve { background: #14532d; color: var(--success); border: 1px solid #166534; }
.btn-reject  { background: #7f1d1d; color: var(--danger);  border: 1px solid #991b1b; }
.btn-ghost   { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-copy    { background: var(--surface3); color: var(--muted); border: 1px solid var(--border); font-size: 11px; padding: 5px 10px; }

/* Auth */
.auth-wall { display: flex; align-items: center; justify-content: center; height: calc(100vh - 49px); flex-direction: column; gap: 16px; }
.auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 340px; display: flex; flex-direction: column; gap: 12px; }
.auth-card h2 { font-size: 15px; font-weight: 700; color: var(--accent); }
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
.field input { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 8px 10px; font-size: 13px; outline: none; transition: border-color .15s; }
.field input:focus { border-color: var(--accent); }
.empty { color: var(--muted); font-size: 13px; font-style: italic; text-align: center; padding: 60px 20px; }

/* Mob order panel */
.mob-order-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 6px; background: var(--surface); border: 1px solid var(--border); margin-bottom: 4px; cursor: grab; user-select: none; transition: background .1s, opacity .15s; }
.mob-order-row:active { cursor: grabbing; }
.mob-order-row.drag-over { border-color: var(--accent); background: rgba(122,90,248,.1); }
.mob-order-row.dragging { opacity: .35; }
.mob-order-handle { color: var(--muted); font-size: 14px; flex-shrink: 0; }
.mob-order-index { font-size: 11px; color: var(--muted); font-family: monospace; width: 38px; text-align: center; flex-shrink: 0; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 4px; outline: none; transition: border-color .15s; }
.mob-order-index:focus { border-color: var(--accent); color: var(--text); }
.mob-order-name { flex: 1; font-size: 13px; }
.mob-order-tag { font-size: 11px; color: var(--muted); background: var(--surface2); border-radius: 4px; padding: 2px 7px; flex-shrink: 0; }
</style>
</head>
<body>

<header>
  <h1>🛡️ Modération</h1>
  <span id="header-role" style="font-size:12px;color:var(--muted);"></span>
  <div class="hbtns">
    <a href="creator.html" class="btn btn-ghost" style="font-size:12px;">⚙️ Creator</a>
    <span id="header-user" style="font-size:12px;color:var(--muted);"></span>
    <button class="btn btn-ghost" id="btn-logout" onclick="doLogout()" style="display:none;font-size:12px;">🚪</button>
  </div>
</header>

<!-- Auth wall -->
<div class="auth-wall" id="auth-wall">
  <div class="auth-card">
    <h2>🔐 Connexion requise</h2>
    <div class="field"><label>Email</label><input type="email" id="login-email" placeholder="admin@example.com"></div>
    <div class="field"><label>Mot de passe</label><input type="password" id="login-password" placeholder="••••••••" onkeydown="if(event.key==='Enter') doLogin()"></div>
    <button class="btn" style="background:var(--accent);color:#fff;" onclick="doLogin()">🔑 Connexion</button>
    <div id="login-error" style="font-size:12px;color:var(--danger);display:none;"></div>
  </div>
</div>

<!-- Main layout (visible une fois connecté) -->
<div class="layout" id="main-layout" style="display:none;">
  <aside class="sidebar">
    <div class="filter-group">
      <div class="filter-label">Statut</div>
      <button class="filter-btn active" data-status="pending"  onclick="setFilter('status','pending')">⏳ En attente  <span class="filter-count" id="count-pending">0</span></button>
      <button class="filter-btn"        data-status="approved" onclick="setFilter('status','approved')">✓ Approuvés   <span class="filter-count" id="count-approved">0</span></button>
      <button class="filter-btn"        data-status="rejected" onclick="setFilter('status','rejected')">✕ Rejetés     <span class="filter-count" id="count-rejected">0</span></button>
      <button class="filter-btn"        data-status="all"      onclick="setFilter('status','all')">📋 Tous          <span class="filter-count" id="count-all">0</span></button>
    </div>
    <div class="filter-group" style="margin-top:8px;">
      <div class="filter-label">Type</div>
      <button class="filter-btn active" data-type="all"    onclick="setFilter('type','all')">Tous les types</button>
      <button class="filter-btn"        data-type="item"   onclick="setFilter('type','item')">⚔️ Items</button>
      <button class="filter-btn"        data-type="pnj"    onclick="setFilter('type','pnj')">🧑 PNJ</button>
      <button class="filter-btn"        data-type="region" onclick="setFilter('type','region')">📍 Régions</button>
    </div>
    <hr style="border:none;border-top:1px solid var(--border);margin:4px 0;">
    <div class="filter-label" style="margin-top:4px;">Admin</div>
    <button class="filter-btn" id="btn-mob-order" onclick="showMobOrder()">🔢 Ordre des mobs</button>
    <button class="btn btn-ghost" onclick="showSubmissions();loadSubmissions()" style="margin-top:auto;font-size:12px;">🔄 Rafraîchir</button>
  </aside>

  <main class="main" id="submissions-list">
    <div class="empty">Chargement…</div>
  </main>

  <!-- Panneau Ordre des mobs -->
  <main class="main" id="mob-order-panel" style="display:none;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
      <span style="font-size:15px;font-weight:700;">🔢 Ordre des mobs</span>
      <button class="btn btn-ghost" id="btn-save-order" onclick="saveMobOrder()" style="font-size:12px;">💾 Sauvegarder</button>
    </div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:10px;">
      Assigne un numéro <code>ordre</code> à chaque mob. Les mobs sans numéro s'affichent en dernier par ordre alphabétique. Les changements sont sauvegardés directement dans Firestore.
    </p>
    <input type="search" id="mob-order-search" placeholder="🔍 Rechercher un mob…"
           oninput="filterMobOrder(this.value)"
           style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 12px;font-size:13px;outline:none;transition:border-color .15s;margin-bottom:12px;">
    <div id="mob-order-list"><div class="empty">Chargement…</div></div>
  </main>
</div>

<script type="module">
import { initializeApp }    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut }
                             from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import { getFirestore, collection, getDocs, doc, updateDoc, setDoc, deleteDoc, serverTimestamp, orderBy, query }
                             from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const app  = initializeApp({
  apiKey:            "AIzaSyBdeKmmEFxmGt7_37PF9uWhm5nz-6eaKq0",
  authDomain:        "veilleurs-a13b3.firebaseapp.com",
  projectId:         "veilleurs-a13b3",
  storageBucket:     "veilleurs-a13b3.firebasestorage.app",
  messagingSenderId: "876055511485",
  appId:             "1:876055511485:web:33d8c8dce684bec05692d4",
});
const auth = getAuth(app);
const db   = getFirestore(app);

const ROLES = ['visiteur', 'membre', 'contributeur', 'modo', 'admin'];
let currentUser = null;
let currentRole = 'visiteur';
let allSubs     = [];
let filterStatus = 'pending';
let filterType   = 'all';

// ── Auth ──────────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  if (!user) {
    showAuthWall();
    return;
  }
  currentUser = user;
  // Lire le rôle
  try {
    const { getDoc } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js');
    const snap = await getDoc(doc(db, 'users', user.uid));
    currentRole = snap.exists() ? (snap.data().role || 'membre') : 'membre';
  } catch { currentRole = 'membre'; }

  const roleLevel = ROLES.indexOf(currentRole);
  if (roleLevel < ROLES.indexOf('modo')) {
    showAuthWall('⛔ Accès réservé aux modérateurs.');
    return;
  }

  document.getElementById('auth-wall').style.display   = 'none';
  document.getElementById('main-layout').style.display = 'grid';
  document.getElementById('header-user').textContent   = '👤 ' + user.email;
  document.getElementById('header-role').textContent   = currentRole;
  document.getElementById('btn-logout').style.display  = '';

  loadSubmissions();
});

function showAuthWall(msg) {
  document.getElementById('auth-wall').style.display   = 'flex';
  document.getElementById('main-layout').style.display = 'none';
  if (msg) {
    const err = document.getElementById('login-error');
    err.textContent = msg; err.style.display = '';
  }
}

window.doLogin = async () => {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-password').value;
  const err   = document.getElementById('login-error');
  err.style.display = 'none';
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    err.textContent = '⛔ ' + e.message; err.style.display = '';
  }
};

window.doLogout = async () => {
  await signOut(auth);
  showAuthWall();
};

// ── Load submissions ──────────────────────────────────
window.loadSubmissions = async () => {
  document.getElementById('submissions-list').innerHTML = '<div class="empty">Chargement…</div>';
  try {
    const q    = query(collection(db, 'submissions'), orderBy('submittedAt', 'desc'));
    const snap = await getDocs(q);
    allSubs = snap.docs.map(d => ({ _id: d.id, ...d.data() }));
    updateCounts();
    renderSubs();
  } catch(e) {
    document.getElementById('submissions-list').innerHTML = `<div class="empty">Erreur : ${e.message}</div>`;
  }
};

function updateCounts() {
  document.getElementById('count-all').textContent      = allSubs.length;
  document.getElementById('count-pending').textContent  = allSubs.filter(s => s.status === 'pending').length;
  document.getElementById('count-approved').textContent = allSubs.filter(s => s.status === 'approved').length;
  document.getElementById('count-rejected').textContent = allSubs.filter(s => s.status === 'rejected').length;
}

// ── Filters ───────────────────────────────────────────
window.setFilter = (key, val) => {
  if (key === 'status') {
    filterStatus = val;
    document.querySelectorAll('.filter-btn[data-status]').forEach(b => b.classList.toggle('active', b.dataset.status === val));
  } else {
    filterType = val;
    document.querySelectorAll('.filter-btn[data-type]').forEach(b => b.classList.toggle('active', b.dataset.type === val));
  }
  renderSubs();
};

function renderSubs() {
  const list = document.getElementById('submissions-list');
  let subs = allSubs;
  if (filterStatus !== 'all') subs = subs.filter(s => s.status === filterStatus);
  if (filterType   !== 'all') subs = subs.filter(s => s.type === filterType);
  if (!subs.length) { list.innerHTML = '<div class="empty">Aucune soumission dans cette catégorie.</div>'; return; }

  list.innerHTML = '';
  for (const sub of subs) {
    list.appendChild(buildCard(sub));
  }
}

function toJSStr(obj, depth = 0) {
  const T = '\t', pad = T.repeat(depth), pad2 = T.repeat(depth + 1);
  if (Array.isArray(obj)) {
    if (!obj.length) return '[]';
    if (obj.every(v => typeof v !== 'object' || v === null)) return '[' + obj.map(v => JSON.stringify(v)).join(', ') + ']';
    return '[\n' + obj.map(v => pad2 + toJSStr(v, depth+1)).join(',\n') + '\n' + pad + ']';
  }
  if (obj !== null && typeof obj === 'object') {
    const entries = Object.entries(obj);
    if (!entries.length) return '{}';
    const allPrim = entries.every(([,v]) => typeof v !== 'object');
    if (allPrim && entries.length <= 6 && depth > 0) return '{' + entries.map(([k,v]) => `${k}:${JSON.stringify(v)}`).join(', ') + '}';
    return '{\n' + entries.map(([k,v]) => `${pad2}${k}:\t\t${toJSStr(v, depth+1)}`).join(',\n') + '\n' + pad + '}';
  }
  return JSON.stringify(obj);
}

function buildCard(sub) {
  const card = document.createElement('div');
  card.className = `sub-card status-${sub.status}`;
  card.id = `card-${sub._id}`;

  const typeLabels = { item:'⚔️ Item', pnj:'🧑 PNJ', region:'📍 Région' };
  const name = sub.data?.name || sub._id;
  const ts   = sub.submittedAt?.toDate ? sub.submittedAt.toDate().toLocaleString('fr-FR') : '—';
  const code = toJSStr(sub.data || {}, 0) + ',';

  const statusLabel = { pending:'⏳ En attente', approved:'✓ Approuvé', rejected:'✕ Rejeté' }[sub.status] || sub.status;

  let actionsHtml = '';
  let editorHtml  = '';
  if (sub.status === 'pending') {
    editorHtml = `
      <div class="sub-editor" id="editor-${sub._id}">
        <textarea class="sub-editor-ta" id="editor-ta-${sub._id}" spellcheck="false"></textarea>
        <div class="sub-editor-err" id="editor-err-${sub._id}"></div>
      </div>
    `;
    actionsHtml = `
      <input type="text" class="sub-comment" id="comment-${sub._id}" placeholder="Commentaire (optionnel)">
      <button class="btn btn-ghost"   id="btn-edit-${sub._id}" onclick="toggleEdit('${sub._id}')" style="font-size:12px;">✏️ Modifier</button>
      <button class="btn btn-approve" onclick="approve('${sub._id}')">✓ Approuver</button>
      <button class="btn btn-reject"  onclick="reject('${sub._id}')">✕ Rejeter</button>
    `;
  } else if (sub.comment) {
    actionsHtml = `<div class="review-comment">💬 ${escHtml(sub.comment)}</div>`;
  }

  card.innerHTML = `
    <div class="sub-head">
      <span class="sub-type">${typeLabels[sub.type] || sub.type}</span>
      <span class="sub-name">${escHtml(name)}</span>
      <span class="sub-meta">${ts}</span>
      <span class="sub-meta">par <b>${escHtml(sub.submittedBy || '—')}</b></span>
      <span class="sub-status ${sub.status}">${statusLabel}</span>
    </div>
    <div class="sub-body">
      <div class="sub-code" id="code-${sub._id}">${escHtml(code)}</div>
      ${editorHtml}
      <div class="sub-actions">
        ${actionsHtml}
        <button class="btn btn-copy" onclick="copyCode('${sub._id}')">📋 Copier</button>
        ${sub.status !== 'pending' ? `<button class="btn btn-copy" onclick="deleteSub('${sub._id}')" style="color:var(--danger);border-color:var(--danger);">🗑️</button>` : ''}
      </div>
    </div>
  `;
  return card;
}

function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Copier le code ────────────────────────────────────
window.copyCode = (id) => {
  const sub  = allSubs.find(s => s._id === id);
  if (!sub) return;
  const code = toJSStr(sub.data || {}, 0) + ',';
  navigator.clipboard.writeText(code);
};

// ── Toggle éditeur inline ─────────────────────────────
window.toggleEdit = (id) => {
  const sub     = allSubs.find(s => s._id === id);
  const editor  = document.getElementById(`editor-${id}`);
  const ta      = document.getElementById(`editor-ta-${id}`);
  const codeDiv = document.getElementById(`code-${id}`);
  const btn     = document.getElementById(`btn-edit-${id}`);
  const errDiv  = document.getElementById(`editor-err-${id}`);
  if (!editor || !ta) return;

  const isOpen = editor.classList.contains('open');
  if (isOpen) {
    // Fermer : valider le JSON
    const errMsg = tryParseEdit(id);
    if (errMsg) { errDiv.textContent = errMsg; errDiv.style.display = ''; return; }
    errDiv.style.display = 'none';
    // Mettre à jour l'aperçu
    codeDiv.textContent = toJSStr(sub.data, 0) + ',';
    editor.classList.remove('open');
    btn.textContent = '✏️ Modifier';
    btn.style.background = '';
  } else {
    // Ouvrir : pre-fill JSON
    ta.value = JSON.stringify(sub.data || {}, null, 2);
    editor.classList.add('open');
    btn.textContent = '✔ Valider';
    btn.style.background = 'rgba(122,90,248,.25)';
    ta.focus();
  }
};

function tryParseEdit(id) {
  const sub = allSubs.find(s => s._id === id);
  const ta  = document.getElementById(`editor-ta-${id}`);
  if (!sub || !ta) return null;
  try {
    const parsed = JSON.parse(ta.value);
    if (typeof parsed !== 'object' || parsed === null) return 'Objet JSON attendu.';
    sub.data = parsed; // mutate in-place → approve() lira la version modifiée
    return null;
  } catch(e) {
    return 'JSON invalide : ' + e.message;
  }
}

// ── Approve ───────────────────────────────────────────
window.approve = async (id) => {
  const sub     = allSubs.find(s => s._id === id);
  if (!sub) return;

  // Si l'éditeur est ouvert, valider d'abord
  const editor = document.getElementById(`editor-${id}`);
  if (editor?.classList.contains('open')) {
    const errMsg = tryParseEdit(id);
    if (errMsg) {
      const errDiv = document.getElementById(`editor-err-${id}`);
      if (errDiv) { errDiv.textContent = errMsg; errDiv.style.display = ''; }
      return;
    }
    editor.classList.remove('open');
  }

  const comment = document.getElementById(`comment-${id}`)?.value?.trim() || '';
  const btn     = document.querySelector(`#card-${id} .btn-approve`);
  if (btn) { btn.disabled = true; btn.textContent = '⏳'; }

  try {
    const colMap = { item: 'items', pnj: 'personnages', region: 'regions' };
    const target = colMap[sub.type];
    if (!target) throw new Error('Type inconnu : ' + sub.type);

    const dataId = sub.data?.id;
    if (!dataId) throw new Error('Pas d\'ID dans les données');

    // Écrire dans la vraie collection
    // _order = timestamp → les nouveaux items s'ajoutent après les items migrés (qui ont de petits entiers)
    const dataToWrite = { _order: Date.now(), ...sub.data };
    await setDoc(doc(db, target, String(dataId)), dataToWrite);

    // Invalider le cache localStorage pour forcer un re-fetch sur les pages de lecture
    localStorage.removeItem(`vcl_cache_v2_${target}`);
    localStorage.removeItem(`vcl_cache_meta_v2_${target}`);

    // Mettre à jour la soumission
    await updateDoc(doc(db, 'submissions', id), {
      status:     'approved',
      reviewedBy: currentUser.uid,
      reviewedAt: serverTimestamp(),
      comment,
    });

    sub.status     = 'approved';
    sub.comment    = comment;
    sub.reviewedBy = currentUser.uid;
    updateCounts();
    renderSubs();
  } catch(e) {
    alert('⛔ Erreur : ' + e.message);
    if (btn) { btn.disabled = false; btn.textContent = '✓ Approuver'; }
  }
};

// ── Reject ────────────────────────────────────────────
window.reject = async (id) => {
  const sub     = allSubs.find(s => s._id === id);
  if (!sub) return;
  const comment = document.getElementById(`comment-${id}`)?.value?.trim() || '';
  const btn     = document.querySelector(`#card-${id} .btn-reject`);
  if (btn) { btn.disabled = true; btn.textContent = '⏳'; }

  try {
    await updateDoc(doc(db, 'submissions', id), {
      status:     'rejected',
      reviewedBy: currentUser.uid,
      reviewedAt: serverTimestamp(),
      comment,
    });

    sub.status     = 'rejected';
    sub.comment    = comment;
    sub.reviewedBy = currentUser.uid;
    updateCounts();
    renderSubs();
  } catch(e) {
    alert('⛔ Erreur : ' + e.message);
    if (btn) { btn.disabled = false; btn.textContent = '✕ Rejeter'; }
  }
};

// ── Mob order panel ───────────────────────────────────
let _mobOrderData  = []; // liste ordonnée après drag-drop
let _mobOrderDirty = false;
let _dragSrc       = null;

const TYPE_ORDER_MOD  = { monstre: 0, sbire: 1, mini_boss: 2, boss: 3 };
const TYPE_LABELS_MOD = { monstre: 'Monstre', sbire: 'Sbire', mini_boss: 'Mini-boss', boss: 'Boss' };

function mobTag(mob) {
  return `P${mob.palier||1} ${TYPE_LABELS_MOD[mob.type]||mob.type}`;
}

function showSubmissions() {
  document.getElementById('submissions-list').style.display = '';
  document.getElementById('mob-order-panel').style.display  = 'none';
  document.getElementById('btn-mob-order').classList.remove('active');
}

window.showMobOrder = async () => {
  document.getElementById('submissions-list').style.display = 'none';
  document.getElementById('mob-order-panel').style.display  = '';
  document.getElementById('btn-mob-order').classList.add('active');
  await loadMobOrder();
};

async function loadMobOrder() {
  const listEl = document.getElementById('mob-order-list');
  listEl.innerHTML = '<div class="empty">Chargement…</div>';
  _mobOrderDirty = false;
  document.getElementById('btn-save-order').disabled = true;
  try {
    const snap = await getDocs(collection(db, 'mobs'));
    const mobs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    // Tri initial : ordre existant → palier → type → nom
    mobs.sort((a, b) => {
      if (a.ordre != null && b.ordre != null) return a.ordre - b.ordre;
      if (a.ordre != null) return -1;
      if (b.ordre != null) return 1;
      if ((a.palier||1) !== (b.palier||1)) return (a.palier||1) - (b.palier||1);
      const ta = TYPE_ORDER_MOD[a.type]??99, tb = TYPE_ORDER_MOD[b.type]??99;
      if (ta !== tb) return ta - tb;
      return (a.name||'').localeCompare(b.name||'');
    });
    _mobOrderData = mobs;
    renderMobOrder();
  } catch(e) {
    listEl.innerHTML = `<div class="empty" style="color:var(--danger)">Erreur : ${e.message}</div>`;
  }
}

function renderMobOrder() {
  const listEl  = document.getElementById('mob-order-list');
  const searchQ = document.getElementById('mob-order-search').value.trim().toLowerCase()
                    .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  listEl.innerHTML = '';

  const visible = searchQ
    ? _mobOrderData.filter(m => (m.name||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').includes(searchQ))
    : _mobOrderData;

  if (!visible.length) {
    listEl.innerHTML = '<div class="empty">Aucun résultat</div>';
    return;
  }

  visible.forEach((mob, i) => {
    const row = document.createElement('div');
    row.className    = 'mob-order-row';
    row.draggable    = !searchQ; // drag désactivé pendant la recherche
    row.dataset.id   = mob.id;
    const realIdx = _mobOrderData.indexOf(mob) + 1;
    row.innerHTML = `
      <span class="mob-order-handle">⠿</span>
      <input type="number" class="mob-order-index" value="${realIdx}" min="1" max="${_mobOrderData.length}" title="Changer la position">
      <span class="mob-order-name">${mob.name||mob.id}</span>
      <span class="mob-order-tag">${mobTag(mob)}</span>`;

    // Changement de numéro
    const indexInput = row.querySelector('.mob-order-index');
    indexInput.addEventListener('click', e => e.stopPropagation());
    indexInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); indexInput.blur(); } });
    indexInput.addEventListener('change', () => {
      const fromIdx = _mobOrderData.indexOf(mob);
      let toIdx = parseInt(indexInput.value, 10) - 1;
      toIdx = Math.max(0, Math.min(_mobOrderData.length - 1, toIdx));
      if (toIdx === fromIdx) { indexInput.value = fromIdx + 1; return; }
      const [moved] = _mobOrderData.splice(fromIdx, 1);
      _mobOrderData.splice(toIdx, 0, moved);
      _mobOrderDirty = true;
      document.getElementById('btn-save-order').disabled = false;
      renderMobOrder();
    });

    // Drag & drop
    row.addEventListener('dragstart', e => {
      _dragSrc = row;
      row.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    row.addEventListener('dragend', () => row.classList.remove('dragging'));
    row.addEventListener('dragover', e => { e.preventDefault(); row.classList.add('drag-over'); });
    row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
    row.addEventListener('drop', e => {
      e.preventDefault();
      row.classList.remove('drag-over');
      if (!_dragSrc || _dragSrc === row) return;

      const fromId = _dragSrc.dataset.id;
      const toId   = row.dataset.id;
      const fromIdx = _mobOrderData.findIndex(m => m.id === fromId);
      const toIdx   = _mobOrderData.findIndex(m => m.id === toId);
      if (fromIdx === -1 || toIdx === -1) return;

      // Réordonner le tableau
      const [moved] = _mobOrderData.splice(fromIdx, 1);
      _mobOrderData.splice(toIdx, 0, moved);

      _mobOrderDirty = true;
      document.getElementById('btn-save-order').disabled = false;
      renderMobOrder();
    });

    listEl.appendChild(row);
  });
}

window.filterMobOrder = () => {
  renderMobOrder();
};

window.saveMobOrder = async () => {
  if (!_mobOrderDirty) return;
  const btn = document.getElementById('btn-save-order');
  btn.disabled = true; btn.textContent = '⏳ Sauvegarde…';

  // Écrire ordre = position (1-based) pour chaque mob dans l'ordre actuel
  let ok = 0, err = 0;
  for (let i = 0; i < _mobOrderData.length; i++) {
    try {
      await updateDoc(doc(db, 'mobs', _mobOrderData[i].id), { ordre: i + 1 });
      ok++;
    } catch(e) {
      console.error(_mobOrderData[i].id, e);
      err++;
    }
  }

  // Invalider le cache localStorage du bestiaire
  localStorage.removeItem('vcl_cache_v2_mobs');
  localStorage.removeItem('vcl_cache_meta_v2_mobs');

  _mobOrderDirty = false;
  btn.textContent = '💾 Sauvegarder';
  alert(err ? `⚠️ Erreur lors de la sauvegarde.` : `✓ Ordre sauvegardé (${ok} mobs).`);
  document.getElementById('mob-order-search').value = '';
  await loadMobOrder();
};

// ── Delete ────────────────────────────────────────────
window.deleteSub = async (id) => {
  if (!confirm('Supprimer définitivement cette soumission ?')) return;
  try {
    await deleteDoc(doc(db, 'submissions', id));
    allSubs = allSubs.filter(s => s._id !== id);
    updateCounts();
    renderSubs();
  } catch(e) {
    alert('⛔ Erreur : ' + e.message);
  }
};
</script>
